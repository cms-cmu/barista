main:
  module: train
  option:
    - --device cpu
    - --max-trainers 1
    - --max-loaders 1

dataset:
  - module: HCR.SimplifiedTrain
    option:
      - --max-workers 1
      - --preserve-order
      - --files label:sparse output/dataset/sparse.root
      - --files label:dense output/dataset/dense.root

model:
  - module: HCR.SparseDenseTrain
    option:
      - --kfolds 2
      - --kfold-seed kfold test
      - --architecture
      - n_features: 4
        attention: true
      - --training FixedStep
      - epoch: 2
        bs_init: 512
        bs_kwargs:
          seed: 0

analysis:
  - module: HCR.LossROC
  - module: compare.CompareTrainingHCR
    option:
      - --atol 1e-4
      - --rtol 1e-3
      - --reference
      - - model:test-SvD,kfolds:2,offset:0:
            training:
              "AUC: sparse vs dense": 0.9944992661476135
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.3903055489063263
              n ghost batch: 16
              stage: Training
            validation:
              "AUC: sparse vs dense": 0.9947476983070374
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.39790141582489014
              n ghost batch: 16
              stage: Training
          model:test-SvD,kfolds:2,offset:1:
            training:
              "AUC: sparse vs dense": 0.9877803921699524
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.31161218881607056
              n ghost batch: 16
              stage: Training
            validation:
              "AUC: sparse vs dense": 0.9847390055656433
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.3151690363883972
              n ghost batch: 16
              stage: Training

setting:
  - module: IO
    option:
      - output: output/main_train
