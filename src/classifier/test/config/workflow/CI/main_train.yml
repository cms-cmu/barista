main:
  module: train
  option:
    - --device cpu
    - --max-trainers 1
    - --max-loaders 1

dataset:
  - module: HCR.SimplifiedTrain
    option:
      - --max-workers 1
      - --preserve-order
      - --files label:sparse output/dataset/sparse.root
      - --files label:dense output/dataset/dense.root

model:
  - module: HCR.SparseDenseTrain
    option:
      - --kfolds 2
      - --kfold-seed kfold test
      - --architecture
      - n_features: 4
        attention: true
      - --training FixedStep
      - epoch: 2
        bs_init: 512
        bs_kwargs:
          seed: 0

analysis:
  - module: HCR.LossROC
  - module: compare.CompareTrainingHCR
    option:
      - --atol 1e-4
      - --rtol 1e-3
      - --reference
      - - model:test-SvD,kfolds:2,offset:0:
            training:
              "AUC: sparse vs dense": 0.9944939017295837
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.3903515040874481
              n ghost batch: 16
              stage: Training
            validation:
              "AUC: sparse vs dense": 0.9947445392608643
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.3979649543762207
              n ghost batch: 16
              stage: Training
          model:test-SvD,kfolds:2,offset:1:
            training:
              "AUC: sparse vs dense": 0.9877798557281494
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.31161433458328247
              n ghost batch: 16
              stage: Training
            validation:
              "AUC: sparse vs dense": 0.9847384095191956
              batch size: 1024
              epoch: 2
              learning rate: 0.01
              loss: 0.3151714503765106
              n ghost batch: 16
              stage: Training

setting:
  - module: IO
    option:
      - output: output/main_train
