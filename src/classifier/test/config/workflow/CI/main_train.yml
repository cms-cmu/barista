main:
  module: train
  option:
    - --device cpu
    - --max-trainers 1
    - --max-loaders 1

dataset:
  - module: HCR.SimplifiedTrain
    option:
      - --max-workers 1
      - --preserve-order
      - --files label:sparse output/dataset/sparse.root
      - --files label:dense output/dataset/dense.root

model:
  - module: HCR.SparseDenseTrain
    option:
      - --kfolds 2
      - --kfold-seed kfold test
      - --architecture
      - n_features: 4
        attention: true
      - --training FixedStep
      - epoch: 2
        bs_init: 512
        bs_kwargs:
          seed: 0

analysis:
  - module: HCR.LossROC

setting:
  - module: IO
    option:
      - output: output/main_train
