main:
  module: compare_datasets
  option:
    - --max-workers 2
    - --groups 0-1

dataset:
  - module: HCR.SimplifiedTrain
    option:
      - --max-workers 1
      - --files label:spread output/dataset/spread.root
      - --files label:dense output/dataset/dense.root

  - module: cache
    option:
      - --input output/cache/result.json

setting:
  - module: IO
    option:
      - output: null
