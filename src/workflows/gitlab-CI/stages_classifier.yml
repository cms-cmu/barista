config_dependencies:
  stage: classifier
  extends: .base_classifier_barista
  script:
    - python -m src.classifier.test.check_configs

generate_dataset:
  stage: classifier
  extends: .base_classifier_barista
  script:
    - ./src/pyml.py from ${CLASSIFIER_WFS}/generate_dataset.yml ${CLASSIFIER_WFS}/common.yml
  artifacts:
    paths:
      - output/dataset/sparse.root
      - output/dataset/dense.root

main_cache:
  stage: classifier
  extends: .base_classifier_barista
  needs:
    - generate_dataset
  script:
    - ./src/pyml.py from ${CLASSIFIER_WFS}/main_cache.yml ${CLASSIFIER_WFS}/common.yml
    - ./src/pyml.py from ${CLASSIFIER_WFS}/main_cache_compare.yml ${CLASSIFIER_WFS}/common.yml
  artifacts:
    paths:
      - output/main_cache/diagnostics/logs.html

main_train:
  stage: classifier
  extends: .base_classifier_barista
  needs:
    - generate_dataset
  script:
    - ./src/pyml.py from ${CLASSIFIER_WFS}/main_train.yml ${CLASSIFIER_WFS}/common.yml
  artifacts:
    paths:
      - output/main_train/result.json
      - output/main_train/states.pkl
      - output/main_train/model_SvB__*.pkl
      - output/main_train/diagnostics/logs.html
      - output/main_train/report/

collect_logs:
  stage: classifier
  extends: .base_classifier_barista
  needs:
    - main_cache
    - main_train
  script:
    - mkdir -p preview/
    - cp output/main_cache/diagnostics/logs.html preview/classifier/logs/main_cache.html
    - cp output/main_train/diagnostics/logs.html preview/classifier/logs/main_train.html
    - cp output/main_train/report/* preview/classifier/report/main_train/
  artifacts:
    expose_as: "HTML Preview"
    paths:
      - preview/
