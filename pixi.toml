[workspace]
name = "snakemake-analysis"
version = "0.1.0"
description = "Snakemake environment for HH4b analysis"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
# Python and core tools
python = ">=3.11"
pip = "*"

# Snakemake and workflow tools
snakemake = "*"
snakemake-executor-plugin-slurm = "*"

# System tools
# Commenting out since they're typically available on target systems
git = "*"
graphviz = "*"

# libopenblas 0.3.30 crashes with SIGBUS on AMD EPYC (AVX-512 compiled, no AVX-512 CPU)
# Pin to avoid the broken build until upstream fixes it
libopenblas = "<0.3.30"

# Additional analysis dependencies (add as needed)
# numpy = "*"

[pypi-dependencies]
# Pip-only packages from Dockerfile
snkmt = { git = "https://github.com/alefisico/snkmt.git", branch = "feat-dask-condor-monitor" }
snakemake-logger-plugin-snkmt = { git = "https://github.com/cademirch/snakemake-logger-plugin-snkmt.git" }

[tasks]
# Define common tasks
snakemake = "snakemake"
snkmt = "snkmt"
install = "pixi install"
shell = "bash"

[feature.dev.dependencies]
# Development-only dependencies
# jupyter = "*"
# ipython = "*"

[feature.hepdata.dependencies]
# Lightweight env for HEPData submission (used ~once/year)
python = ">=3.11"
pip = "*"

[feature.hepdata.pypi-dependencies]
hepdata-validator = "*"
hepdata-lib = "*"

[feature.hepdata.tasks]
validate = "hepdata-validate"

[feature.reana.dependencies]
python = ">=3.11"
pip = "*"
setuptools = "<70.0.0"
snakemake = "9.16.3"
jsonschema = "<4.10.0"

[feature.reana.pypi-dependencies]
reana-client = ">=0.95.0a1"
reana-commons = { git = "https://github.com/alefisico/reana-commons", rev = "8dcdb5d6dd16893895ee18ec3d6c3564e6cbac2d" }
rdflib-jsonld = ">=0.6.0"

[feature.reana.activation.env]
PYTHONNOUSERSITE = "1"

[environments]
# Default environment includes all base dependencies
default = {features = [], solve-group = "default"}
# Development environment includes dev dependencies
dev = {features = ["dev"], solve-group = "default"}
# HEPData tools (validate/create submissions)
hepdata = {features = ["hepdata"], solve-group = "hepdata"}
# REANA client
reana = {features = ["reana"], solve-group = "reana", no-default-feature = true}