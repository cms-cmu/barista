[workspace]
name = "snakemake-analysis"
version = "0.1.0"
description = "Snakemake environment for HH4b analysis"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
# Python and core tools
python = ">=3.11"
pip = "*"

# Snakemake and workflow tools
snakemake = "*"

# System tools
# Commenting out since they're typically available on target systems
git = "*"
graphviz = "*"

# Additional analysis dependencies (add as needed)
# numpy = "*"

[pypi-dependencies]
# Pip-only packages from Dockerfile
panoptes-ui = "*"
snakemake-logger-plugin-snkmt = "*"

[tasks]
# Define common tasks
snakemake = "snakemake"
snkmt = "snkmt"
install = "pixi install"
shell = "bash"

[feature.dev.dependencies]
# Development-only dependencies
# jupyter = "*"
# ipython = "*"

[feature.hepdata.dependencies]
# Lightweight env for HEPData submission (used ~once/year)
python = ">=3.11"
pip = "*"

[feature.hepdata.pypi-dependencies]
hepdata-validator = "*"
hepdata-lib = "*"

[feature.hepdata.tasks]
validate = "hepdata-validate"

[feature.reana.dependencies]
python = "3.10.*"
pip = "*"
setuptools = "<70.0.0"

[feature.reana.pypi-dependencies]
reana-client = "*"

[environments]
# Default environment includes all base dependencies
default = {features = [], solve-group = "default"}
# Development environment includes dev dependencies
dev = {features = ["dev"], solve-group = "default"}
# HEPData tools (validate/create submissions)
hepdata = {features = ["hepdata"], solve-group = "hepdata"}
# REANA client
reana = {features = ["reana"], solve-group = "reana", no-default-feature = true}