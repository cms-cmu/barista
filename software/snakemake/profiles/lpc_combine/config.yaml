# Snakemake profile for CMS Combine workflows on FNAL LPC.
# Extends lpc profile with cluster-generic executor that submits rules to HTCondor
# via submit_wrapper.py (only combine-eligible rules go to the grid; others run locally).
software-deployment-method:
  - apptainer
apptainer-args: "-B /cvmfs -B /cvmfs/grid.cern.ch/etc/grid-security:/etc/grid-security -B /uscmst1b_scratch -B /uscms_data -B software/combine/apptainer_env.sh:/srv/apptainer_env.sh --env BASH_ENV=/srv/apptainer_env.sh --env ENV=/srv/apptainer_env.sh"
executor: cluster-generic
cluster-generic-submit-cmd: "python software/snakemake/scripts/submit_wrapper.py"
cluster-generic-status-cmd: "python software/snakemake/scripts/status_wrapper.py"
cluster-generic-cancel-cmd: "condor_rm"
default-resources:
  - "tmpdir='/tmp'"
  - "mem_mb=4000"
latency-wait: 60
