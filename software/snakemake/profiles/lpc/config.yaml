# Snakemake profile for FNAL LPC cluster (cmslpc)
# Analysis workflows (friendtrees, classifier, etc.) — no cluster executor,
# jobs run locally on the login node and submit their own HTCondor workers via runner.py.
software-deployment-method:
  - apptainer
apptainer-args: "-B /cvmfs -B /cvmfs/grid.cern.ch/etc/grid-security:/etc/grid-security -B /uscmst1b_scratch -B /uscms_data -B software/combine/apptainer_env.sh:/srv/apptainer_env.sh --env BASH_ENV=/srv/apptainer_env.sh --env ENV=/srv/apptainer_env.sh"
default-resources:
  - "tmpdir='/tmp'"
  - "mem_mb=4000"
latency-wait: 60
