# Snakemake profile for CMU Falcon cluster
executor: slurm
software-deployment-method:
  - apptainer
apptainer-args: "-B /cvmfs -B /cvmfs/grid.cern.ch/etc/grid-security:/etc/grid-security -B /home/export/ -B /tmp:/tmp --env \"X509_USER_PROXY\"=\"proxy/x509_proxy\" --nv -B software/combine/apptainer_env.sh:/srv/apptainer_env.sh --env BASH_ENV=/srv/apptainer_env.sh --env ENV=/srv/apptainer_env.sh"
slurm-logdir: "slurm_logs"
slurm-status-command: "squeue"
latency-wait: 60
# Note: Falcon has no HTCondor. The Run3 Snakefiles auto-detect this via
# `shutil.which("condor_submit")` in rules/run3_variants.smk and default
# `run_on_condor=False` on falcon. Override with `--config run_on_condor=True`.
default-resources:
  slurm_partition: "work"
  # Default QoS is 'light'. Per the CMS-CMU SLURM guide, jobs using >25 MPS/job
  # must use 'medium' (or higher) — the admin reaps >25-MPS jobs left on 'light'
  # (State 'CANCELLED by 0' at ~5 min). Set `resources: qos="medium"` per-rule on
  # the GPU train rules (mps:30). https://cms-cmu.docs.cern.ch/computing/slurm_guide/
  # Snakemake parses bare numeric runtime values from profile YAML as SECONDS
  # via humanfriendly.parse_timespan (resources.py:860). A unit suffix forces
  # interpretation as minutes/hours. "8h" → 480 min, fits in the work partition's
  # 2-day max. Override per-rule with `resources: runtime = N` where N is minutes.
  runtime: "8h"
  mem_mb: 16000
  cpus_per_task: 4
  tmpdir: "/tmp"
  mpi: "none"
  tasks: 2
