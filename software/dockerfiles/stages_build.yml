.buildah:
  stage: build
  image: quay.io/buildah/stable
  variables:
    DOCKER_FILE_NAME: "Dockerfile"
    REGISTRY_IMAGE_PATH: ${CI_REGISTRY_IMAGE}:test
    EXTRA_TAGS: "test"
  script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - export BUILDAH_FORMAT=docker
    - export STORAGE_DRIVER=vfs
    - buildah images
    - buildah build --storage-driver=$STORAGE_DRIVER -f $DOCKER_FILE_NAME -t $REGISTRY_IMAGE_PATH
    - if [ -n "$EXTRA_TAGS" ]; then
        for tag in $EXTRA_TAGS; do
          buildah tag $REGISTRY_IMAGE_PATH ${CI_REGISTRY_IMAGE}:$tag;
        done;
      fi
    - buildah images
    - buildah push --storage-driver=$STORAGE_DRIVER $REGISTRY_IMAGE_PATH
    - if [ -n "$EXTRA_TAGS" ]; then
        for tag in $EXTRA_TAGS; do
          buildah push --storage-driver=$STORAGE_DRIVER ${CI_REGISTRY_IMAGE}:$tag;
        done;
      fi

build_container:
  extends:
    - .buildah
  before_script:
    - export REGISTRY_IMAGE_PATH="${CI_REGISTRY_IMAGE}:$(date +%Y%m%d)_$CI_COMMIT_SHORT_SHA"
    - echo $REGISTRY_IMAGE_PATH
  variables:
    DOCKER_FILE_NAME: "software/dockerfiles/Dockerfile_analysis"
    EXTRA_TAGS: "test"
  after_script:
    - echo "ANALYSIS_IMAGE_TAG=test" > build.env
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: $RECREATE_CONTAINERS == "true"
    # - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH =~ /^container.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - software/dockerfiles/Dockerfile_analysis


deploy_container:
  stage: deploy
  image: quay.io/buildah/stable
  needs:
    - build_container
  script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - export STORAGE_DRIVER=vfs
    - buildah pull --storage-driver=$STORAGE_DRIVER ${CI_REGISTRY_IMAGE}:test
    - buildah tag ${CI_REGISTRY_IMAGE}:test ${CI_REGISTRY_IMAGE}:latest
    - buildah push --storage-driver=$STORAGE_DRIVER ${CI_REGISTRY_IMAGE}:latest
  rules:
    - if: $RECREATE_CONTAINERS == "true"
    - if: $CI_COMMIT_BRANCH =~ /^container.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - software/dockerfiles/Dockerfile_analysis

