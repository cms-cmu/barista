build_classifier_gpu_container:
  extends:
    - .buildah
  before_script:
    - export REGISTRY_IMAGE_PATH="${CI_REGISTRY_IMAGE}:classifier_$(date +%Y%m%d)_$CI_COMMIT_SHORT_SHA"
    - echo $REGISTRY_IMAGE_PATH
    - cd software/dockerfiles/ml/
  variables:
    DOCKER_FILE_NAME: "Dockerfile_ml_gpu"
    EXTRA_TAGS: "classifier_test"
  rules:
    - if: $RECREATE_CONTAINERS == "true"
    - if: $CI_COMMIT_BRANCH =~ /^container.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
      - software/dockerfiles/ml/Dockerfile_ml_gpu
      - software/dockerfiles/ml/env_ml_gpu.yml

build_classifier_cpu_container:
  extends:
    - .buildah
  before_script:
    - export REGISTRY_IMAGE_PATH="${CI_REGISTRY_IMAGE}:classifier_cpu_$(date +%Y%m%d)_$CI_COMMIT_SHORT_SHA"
    - echo $REGISTRY_IMAGE_PATH
    - cd software/dockerfiles/ml/
  variables:
    DOCKER_FILE_NAME: "Dockerfile_ml_cpu"
    EXTRA_TAGS: "classifier_cpu_test"
  after_script:
    - echo "CLASSIFIER_IMAGE_TAG=classifier_cpu_test" > build_classifier.env
  artifacts:
    reports:
      dotenv: build_classifier.env
  rules:
    - if: $RECREATE_CONTAINERS == "true"
    - if: $CI_COMMIT_BRANCH =~ /^container.*/ || $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
      - software/dockerfiles/ml/Dockerfile_ml_cpu
      - software/dockerfiles/ml/env_ml_cpu.yml


deploy_classifier_cpu_container:
  stage: deploy
  image: quay.io/buildah/stable
  needs:
    - build_classifier_cpu_container
  script:
    - echo "$CI_REGISTRY_PASSWORD" | buildah login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - export STORAGE_DRIVER=vfs
    - buildah pull --storage-driver=$STORAGE_DRIVER ${CI_REGISTRY_IMAGE}:classifier_cpu_test
    - buildah tag ${CI_REGISTRY_IMAGE}:classifier_cpu_test ${CI_REGISTRY_IMAGE}:classifier_cpu_latest
    - buildah push --storage-driver=$STORAGE_DRIVER ${CI_REGISTRY_IMAGE}:classifier_cpu_latest
  rules:
    - if: $RECREATE_CONTAINERS == "true"
    - if: $CI_COMMIT_BRANCH =~ /^container.*/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - software/dockerfiles/ml/Dockerfile_ml_cpu
        - software/dockerfiles/ml/env_ml_cpu.yml
